name: Release

# Build self-contained, per-OS app-images and publish them to a GitHub Release.
# Triggered by pushing a version tag (e.g. `v1.0.0`); workflow_dispatch allows a
# manual dry run (no Release is created on dispatch — artifacts only).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            javacpp: linux-x86_64
          - os: windows-latest
            platform: windows-x64
            javacpp: windows-x86_64
    runs-on: ${{ matrix.os }}
    # Exposed as an env var (not read straight from secrets) so step `if:` conditions can gate on it — the
    # `secrets` context isn't available in `if`. Empty when the maintainer hasn't configured signing yet.
    env:
      GPG_KEY_ID: ${{ secrets.GPG_KEY_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      # jpackage's RPM build shells out to rpmbuild (not on ubuntu-latest) and its DEB build needs fakeroot.
      # wget + desktop-file-utils are for the AppImage build; dpkg-sig for signing the .deb.
      # Without rpm/fakeroot, `-Pdist package` fails on Linux and the whole release job (and Release) aborts.
      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot wget desktop-file-utils dpkg-sig

      # Imports the GPG secret key (base64-encoded) so the .rpm/.deb/AppImage can be signed under the
      # "LiQiyeDev" identity. Skipped (leaving unsigned packages) when the signing secrets aren't set, so the
      # pipeline works before the maintainer configures them. See ROADMAP for the one-time key setup.
      - name: Import signing key (Linux)
        if: runner.os == 'Linux' && env.GPG_KEY_ID != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpgconf --reload gpg-agent || true
          echo "$GPG_PRIVATE_KEY" | base64 -d | gpg --batch --import
          cat > ~/.rpmmacros <<EOF
          %_gpg_name ${GPG_KEY_ID}
          %__gpg_sign_cmd %{__gpg} gpg --batch --no-verbose --no-armor --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          EOF
          echo "BOTMAKER_SIGN=1" >> "$GITHUB_ENV"

      - name: Resolve version label
        id: ver
        shell: bash
        run: |
          ref="${GITHUB_REF_NAME}"
          # On tag pushes GITHUB_REF_NAME is the tag (e.g. v1.0.0); otherwise use the sha.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "label=${ref}" >> "$GITHUB_OUTPUT"
          else
            echo "label=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi
          # Numeric MAJOR.MINOR.PATCH for jpackage/manifest: strip a leading `v` and any pre-release suffix
          # (v1.0.5 -> 1.0.5, v1.2.0-rc1 -> 1.2.0). Non-tag builds fall back to 1.0.0 (jpackage rejects non-numeric).
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            num="${ref#v}"; num="${num%%-*}"
          else
            num="1.0.0"
          fi
          echo "appversion=${num}" >> "$GITHUB_OUTPUT"

      - name: Resolve botmaker-shared version
        id: shared
        shell: bash
        run: |
          # Studio's pom pins botmaker.shared.version=0.0.0-SNAPSHOT (the reactor/dev value). This standalone
          # build has no reactor, so resolve the newest published shared release tag and inject it via -D on
          # the build below — the committed pom is never edited.
          SHARED=$(git ls-remote --tags --refs https://github.com/LiQiyeDev/botmaker-shared 'v*' | awk -F/ '{print $NF}' | sort -V | tail -1)
          echo "version=${SHARED:-v0.0.4}" >> "$GITHUB_OUTPUT"

      - name: Build app-image
        # bash (Git Bash on Windows) keeps -D argument quoting consistent across both runners.
        # -Djavacpp.platform=<host> ships only this OS's OpenCV natives (much smaller image).
        # -Dapp.version=<tag> bakes the real version into the jpackage --app-version + manifest
        # Implementation-Version, so the installed app reports its true version (else the updater
        # always sees itself as the pom default 1.0.0 and re-prompts).
        # Tests are skipped here: the release pipeline only packages the artifact; the test
        # suite runs on push/PR CI. (Avoids gating releases on known-red tests.)
        # -Dbotmaker.shared.version=<tag> resolves shared from JitPack (the SNAPSHOT pom default won't resolve
        # on a clean runner without the reactor).
        shell: bash
        run: mvn -B -Pdist package -DskipTests -Djavacpp.platform=${{ matrix.javacpp }} -Dapp.version=${{ steps.ver.outputs.appversion }} -Dbotmaker.shared.version=${{ steps.shared.outputs.version }}

      # The portable app-image (zipped) is kept as a no-install fallback; the native installers
      # (.deb/.rpm on Linux, .msi on Windows) are emitted by `-Pdist` into target/dist alongside it.
      - name: Sign .rpm/.deb (Linux)
        if: runner.os == 'Linux'
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        # Never let a signing hiccup abort the release — unsigned packages still ship.
        continue-on-error: true
        run: bash .github/scripts/sign-packages.sh

      - name: Package zip + tarball + AppImage + collect installers (Linux)
        if: runner.os == 'Linux'
        run: |
          base="BotMaker-Studio-${{ steps.ver.outputs.label }}-${{ matrix.platform }}"
          # Portable zip + tarball of the app-image (extract-and-run, no installer, no password).
          cd "target/dist"
          zip -r -q "${GITHUB_WORKSPACE}/${base}.zip" "BotMaker Studio"
          tar -czf "${GITHUB_WORKSPACE}/${base}.tar.gz" "BotMaker Studio"
          cd "${GITHUB_WORKSPACE}"
          # Rename native installers to a versioned, platform-tagged name for the release assets.
          for f in target/dist/*.deb target/dist/*.rpm; do
            [ -e "$f" ] || continue
            cp "$f" "${base}.${f##*.}"
          done
          # AppImage (recommended password-free channel; the in-app updater self-updates it).
          bash .github/scripts/build-appimage.sh "${base}.AppImage"

      - name: Build Flatpak (Linux, best-effort)
        if: runner.os == 'Linux'
        # Flatpak's sandbox constrains window capture / input injection (see the manifest caveat), and the
        # build is heavy — so it must never block the release.
        continue-on-error: true
        run: |
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
          flatpak install --user -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08
          # Stage the app-image + icon + desktop next to the manifest, then build a single-file bundle.
          stage="$(pwd)/flatpak-stage"
          rm -rf "$stage"; mkdir -p "$stage"
          cp -a "target/dist/BotMaker Studio" "$stage/"
          cp src/main/resources/icons/icon.png "$stage/botmaker-studio.png"
          sed 's/^Exec=AppRun/Exec=BotMaker Studio/' flatpak/*.desktop.tmpl > "$stage/com.liqiyedev.BotMakerStudio.desktop" 2>/dev/null || \
          printf '[Desktop Entry]\nType=Application\nName=BotMaker Studio\nExec=BotMaker Studio\nIcon=com.liqiyedev.BotMakerStudio\nCategories=Development;\nTerminal=false\n' > "$stage/com.liqiyedev.BotMakerStudio.desktop"
          cp flatpak/com.liqiyedev.BotMakerStudio.yml "$stage/"
          cd "$stage"
          flatpak-builder --user --force-clean --repo=repo build-dir com.liqiyedev.BotMakerStudio.yml
          flatpak build-bundle repo "${GITHUB_WORKSPACE}/BotMaker-Studio-${{ steps.ver.outputs.label }}-${{ matrix.platform }}.flatpak" com.liqiyedev.BotMakerStudio

      - name: Package zip + collect installers (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/dist/BotMaker Studio" -DestinationPath "BotMaker-Studio-${{ steps.ver.outputs.label }}-${{ matrix.platform }}.zip"
          Get-ChildItem "target/dist/*.msi" | ForEach-Object {
            Copy-Item $_.FullName "BotMaker-Studio-${{ steps.ver.outputs.label }}-${{ matrix.platform }}.msi"
          }

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: BotMaker-Studio-${{ matrix.platform }}
          path: |
            BotMaker-Studio-*-${{ matrix.platform }}.zip
            BotMaker-Studio-*-${{ matrix.platform }}.tar.gz
            BotMaker-Studio-*-${{ matrix.platform }}.deb
            BotMaker-Studio-*-${{ matrix.platform }}.rpm
            BotMaker-Studio-*-${{ matrix.platform }}.AppImage
            BotMaker-Studio-*-${{ matrix.platform }}.flatpak
            BotMaker-Studio-*-${{ matrix.platform }}.msi
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    # Only publish a Release for actual tag pushes, not manual dry runs.
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.zip
            artifacts/*.tar.gz
            artifacts/*.deb
            artifacts/*.rpm
            artifacts/*.AppImage
            artifacts/*.flatpak
            artifacts/*.msi
          generate_release_notes: true
          # Tags containing a hyphen (e.g. v1.0.0-rc1) are treated as pre-releases.
          prerelease: ${{ contains(github.ref_name, '-') }}
