# Flatpak manifest for BotMaker Studio.
#
# ⚠️ IMPORTANT CAVEAT: BotMaker Studio captures arbitrary windows and synthesises mouse/keyboard input —
# both are heavily restricted by the Flatpak sandbox. The finish-args below punch the sandbox wide open
# (host X11 socket, devices, network) so capture/input keep working on X11. Under native Wayland, global
# capture/input still require xdg-desktop-portal (RemoteDesktop/ScreenCast) and may prompt or fail. Treat the
# Flatpak as BEST-EFFORT and validate capture + input on the target desktop before advertising it. The
# AppImage is the recommended universal Linux build.
#
# This manifest bundles the jpackage app-image (built by `mvn -Pdist package`) rather than compiling from
# source inside flatpak-builder, so the CI must stage `target/dist/BotMaker Studio` next to this file first.
app-id: com.liqiyedev.BotMakerStudio
runtime: org.freedesktop.Platform
runtime-version: '23.08'
sdk: org.freedesktop.Sdk
command: BotMaker Studio

finish-args:
  - --socket=x11
  - --socket=fallback-x11
  - --share=ipc
  - --share=network
  - --device=all
  # Screen-cast / remote-desktop portals (needed for capture + input under Wayland).
  - --talk-name=org.freedesktop.portal.Desktop
  - --system-talk-name=org.freedesktop.portal.Desktop
  - --filesystem=home

modules:
  - name: botmaker-studio
    buildsystem: simple
    build-commands:
      - mkdir -p /app/opt/botmaker-studio
      - cp -a "BotMaker Studio/." /app/opt/botmaker-studio/
      - mkdir -p /app/bin
      - ln -s "/app/opt/botmaker-studio/bin/BotMaker Studio" "/app/bin/BotMaker Studio"
      - install -Dm644 botmaker-studio.png /app/share/icons/hicolor/512x512/apps/com.liqiyedev.BotMakerStudio.png
      - install -Dm644 com.liqiyedev.BotMakerStudio.desktop /app/share/applications/com.liqiyedev.BotMakerStudio.desktop
    sources:
      - type: dir
        path: .
